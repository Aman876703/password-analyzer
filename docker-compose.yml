version: '3.8'

services:
  # FastAPI ML Backend
  ml-backend:
    build:
      context: .
      dockerfile: Dockerfile.ml
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./password_analyzer_ml.py:/app/password_analyzer_ml.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - password-analyzer-network

  # Node.js/Express Backend
  node-backend:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - ML_API_URL=http://ml-backend:8000
      - NODE_ENV=production
    depends_on:
      ml-backend:
        condition: service_healthy
    volumes:
      - ./server.js:/app/server.js
      - ./public:/app/public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - password-analyzer-network

networks:
  password-analyzer-network:
    driver: bridge
